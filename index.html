<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sedgwick+Ave+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/reset.css">
    <link rel="stylesheet" href="./src/styles/style.css">
</head>
<body>
    <main>
        <header>
            <div class="tittle-header">
                <img src="./src/assets/image/header/Logo.svg" alt="">
                <h1> AUTO GARAGEM </h1>
            </div>
            <nav>
                <a href=""> Sobre Nós </a>
                <a href=""> Serviços </a>
                <a href=""> Projetos </a>
                <a href=""> Avaliações </a>
            </nav>
            <button> Inscreva-se </button>
        </header>
        <div class="hero">
            <div class="content-hero">
                <h1> Os melhores serviços <br> para seu <span class="carro-hero"> carro </span></h1>
                <p> Agende seu conserto aonde estiver pelo <br> nosso Whatsapp! </p>
            </div>
            <div class="contact-hero">
                <aside>
                    <img src="./src/assets/image/hero/location.svg" alt="">
                    <div class="content-location">
                        <h1> Localização </h1>
                        <p> Pesquise sua localização </p>
                    </div>
                </aside>
                <aside>
                    <img src="./src/assets/image/hero/calendar.svg" alt="">
                    <div class="content-visit">
                        <h1> Data de visita </h1>
                        <p> dd/mm/aaaa </p>
                    </div>
                </aside>
                <button>
                    <img src="./src/assets/image/hero/whatsapp-icon.svg" alt="">
                    <h4> Enviar </h4>
                </button>
            </div>
        </div>
    </main>
